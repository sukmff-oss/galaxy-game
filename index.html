<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>銀河街戰士</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020818">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23020818'/><text y='.9em' font-size='80' x='10'>🚀</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;touch-action:none;}
#canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}
#ui{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;display:none;}
#ui-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,0.6);}
.stat{display:flex;flex-direction:column;align-items:center;min-width:60px;}
.stat-label{font-size:9px;color:#aaa;letter-spacing:1px;}
.stat-val{font-size:16px;font-weight:bold;color:#0ff;text-shadow:0 0 8px #0ff;}
#hp-bar-wrap{flex:1;margin:0 10px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
#hp-bar{height:100%;width:100%;background:linear-gradient(90deg,#f33,#0f0);border-radius:4px;transition:width 0.2s;}
#xp-bar-wrap{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-top:2px;}
#xp-bar{height:100%;width:0%;background:linear-gradient(90deg,#f0f,#0ff);border-radius:2px;}
#shield-indicator{position:fixed;bottom:175px;left:0;right:0;display:none;justify-content:center;z-index:10;pointer-events:none;}
#inv-indicator{position:fixed;bottom:145px;left:0;right:0;display:none;justify-content:center;z-index:10;pointer-events:none;}
#shield-text{color:#fff;font-size:14px;text-shadow:0 0 10px #0ff;animation:pulse 0.5s infinite alternate;}
#inv-text{color:#a0f;font-size:14px;text-shadow:0 0 10px #a0f;animation:pulse 0.5s infinite alternate;}
@keyframes pulse{from{opacity:0.6;transform:scale(1)}to{opacity:1;transform:scale(1.1)}}
#hud-levelup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:#ff0;text-shadow:0 0 20px #ff0;z-index:50;pointer-events:none;display:none;}
#kill-notify{position:fixed;top:40%;left:50%;transform:translateX(-50%);font-size:20px;color:#f66;text-shadow:0 0 15px #f33;z-index:50;pointer-events:none;display:none;}
#drone-indicator{position:fixed;bottom:115px;left:0;right:0;display:none;justify-content:center;z-index:10;pointer-events:none;}
#drone-text{color:#0f0;font-size:12px;text-shadow:0 0 8px #0f0;}
@keyframes levelup{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-70%) scale(0.8)}}
@keyframes notifyAnim{0%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(0.7)}}
@keyframes titleGlow{0%,100%{text-shadow:0 0 20px #0ff,0 0 40px #08f}50%{text-shadow:0 0 40px #0ff,0 0 80px #0af,0 0 120px #08f}}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes bgPulse{0%,100%{opacity:0.03}50%{opacity:0.08}}
@keyframes subtitleSweep{0%{background-position:-200% center}100%{background-position:200% center}}
.title{font-size:clamp(28px,8vw,48px);font-weight:bold;color:#0ff;letter-spacing:4px;margin-bottom:8px;animation:titleGlow 2s ease-in-out infinite, titleFloat 3s ease-in-out infinite;}
.subtitle{font-size:clamp(12px,3vw,16px);color:#8af;margin-bottom:30px;}
#start-screen{overflow:hidden;background:radial-gradient(ellipse at 50% 30%,rgba(0,80,255,0.12) 0%,transparent 60%);}
#start-screen::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,255,255,0.02) 40px,rgba(0,255,255,0.02) 41px);animation:bgPulse 4s ease-in-out infinite;pointer-events:none;}
.screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,10,0.95);}
#gameover-screen{display:none;}
.btn{padding:12px 40px;font-size:18px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#08f,#0cf);border:none;border-radius:8px;cursor:pointer;margin:8px;box-shadow:0 0 15px rgba(0,200,255,0.5);pointer-events:all;touch-action:manipulation;}
.btn:active{transform:scale(0.96);}
.btn-lb{background:linear-gradient(135deg,#08f,#04a)!important;}
#ctrl{display:none;position:fixed;bottom:10px;left:0;right:0;z-index:20;pointer-events:none;}
#ctrl-row{display:flex;justify-content:space-between;padding:0 20px;}
.ctrl-btn{width:60px;height:60px;background:rgba(0,200,255,0.15);border:2px solid rgba(0,200,255,0.5);border-radius:12px;font-size:28px;color:#0ff;display:flex;align-items:center;justify-content:center;pointer-events:all;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
#btn-L{position:absolute;left:20px;bottom:80px;}
#btn-R{position:absolute;right:20px;bottom:80px;}
#lb-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;display:none;background:rgba(0,5,25,0.97);border:2px solid #0ff;border-radius:12px;padding:20px;min-width:300px;max-width:90vw;max-height:80vh;overflow-y:auto;color:#fff;}
#lb-panel h2{color:#0ff;text-align:center;margin:0 0 16px;font-size:20px;}
#lb-panel table{width:100%;border-collapse:collapse;font-size:13px;}
#lb-panel th{color:#ff0;border-bottom:1px solid #0ff;padding:6px 4px;text-align:left;}
#lb-panel td{padding:6px 4px;border-bottom:1px solid rgba(0,255,255,0.1);}
.lb-btn{margin-top:12px;width:100%;padding:10px;background:#08f;border:none;border-radius:6px;color:#fff;font-size:16px;cursor:pointer;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui"><div id="ui-bar"><div class="stat"><div class="stat-label">LV</div><div class="stat-val" id="ui-lv">1</div></div><div id="hp-bar-wrap"><div id="hp-bar"></div><div id="xp-bar-wrap"><div id="xp-bar"></div></div></div><div class="stat"><div class="stat-label">分</div><div class="stat-val" id="ui-score">0</div></div></div></div>
<div id="shield-indicator"><span id="shield-text">🛡 防護罩 3秒</span></div>
<div id="inv-indicator"><span id="inv-text">⚡ 無敵 3秒</span></div>
<div id="drone-indicator"><span id="drone-text">&#x1F4E6; 無人機導彈 已就緒</span></div>
<div id="hud-levelup"></div>
<div id="kill-notify"></div>
<div id="ctrl"><div id="ctrl-row"><div class="ctrl-btn" id="btn-left">◀</div><div class="ctrl-btn" id="btn-up">▲</div><div class="ctrl-btn" id="btn-down">▼</div><div class="ctrl-btn" id="btn-right">▶</div></div><div id="btn-L" class="ctrl-btn">J</div><div id="btn-R" class="ctrl-btn">K</div></div>

<div class="screen" id="start-screen">
  <div class="title">🚀 銀河街戰士 🚀</div>
  <div class="subtitle">WASD 移動 / 道具掉落 / 無人機導彈 / 魔王來襲</div>
  <div class="subtitle" style="color:#ff0;font-size:13px;">Lv10=無人機 Lv20/40/60/80=魔王 🛡❤️⚡💣⚡</div>
  <button class="btn" id="btn-start">開始遊戲</button>
  <button class="btn btn-lb" id="btn-lb-start">🏆 排行榜</button>
</div>
<div id="gameover-screen" class="screen">
  <div class="title">GAME OVER</div>
  <div class="subtitle" id="go-info">分數: 0 / 等級: 1 / 擊殺: 0</div>
  <div id="lb-your" class="subtitle" style="color:#ff0;font-size:12px;display:none;"></div>
  <button class="btn btn-lb" id="btn-lb">🏆 排行榜</button>
  <button class="btn" id="btn-restart">再來一次</button>
</div>
<div id="lb-panel">
  <h2>🏆 全球排行榜</h2>
  <table><thead><tr><th>#</th><th>分數</th><th>LV</th><th>擊殺</th></tr></thead><tbody id="lb-tbody"></tbody></table>
  <div id="lb-your" class="subtitle" style="color:#ff0;font-size:12px;margin-top:10px;display:none;"></div>
  <button class="lb-btn" id="btn-lb-close">關閉</button>
</div>

<script>
// ═══ STATE ═══
const canvas = document.getElementById('canvas');
const cx = canvas.getContext('2d');
let W, H;
const SAVE = 'galaxySave_v3';
const LB_URL = 'https://api.jsonbin.io/v3/b/69f00f9caaba8821974620d8/latest';
const LB_KEY = '$2a$10$nevty'; // [REDACTED]
let G, player;
let bullets = [], eBullets = [], enemies = [], parts = [], stars = [];
let missiles = [], items = [], drones = [];
let spawnT = 0, bossWarn = 0, shakeT = 0, shakeI = 0;
let lastFireTime = 0, lastT = 0;
let bossPendingLv = 0, bossSpawnedLv = 0, bossActive = false;
let invT = 0, atkBoost = 1;

// ═══ ITEM TYPES ═══
// 0=shield, 1=heal, 2=atk boost, 3=bomb, 4=invincibility
const ITEM_TYPES = [
  { r:15, col:'#0ff', emoji:'🛡', effect:'shield', val:5 },
  { r:12, col:'#f55', emoji:'❤️', effect:'heal',   val:50 },
  { r:12, col:'#ff0', emoji:'⚡', effect:'atk',    val:2 },
  { r:16, col:'#f80', emoji:'💣', effect:'boom',   val:0 },
  { r:14, col:'#a0f', emoji:'⚡', effect:'inv',    val:4 },
];
const ITEM_DROP = 0.15;

// ═══ RESIZE ═══
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (player) { player.x = W/2; player.y = H*0.75; }
}

// ═══ AUDIO ═══
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}
function play(type) {
  try {
    const ac = getAC();
    const now = ac.currentTime;
    if (type === 'explosion') {
      const sz = Math.floor(ac.sampleRate * 0.5);
      const buf = ac.createBuffer(1, sz, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/sz,2);
      const src = ac.createBufferSource(), g = ac.createGain(), f = ac.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = 400;
      src.buffer = buf; src.connect(f); f.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0.5, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      src.start(now);
    } else if (type === 'hurt') {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(80, now + 0.15);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.start(now); o.stop(now + 0.15);
    } else if (type === 'boss') {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(80, now);
      g.gain.setValueAtTime(0.4, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
      o.start(now); o.stop(now + 1.5);
    }
  } catch(e) {}
}

// ═══ STARS ═══
function mkStars() {
  stars = [];
  for (let i = 0; i < 120; i++) stars.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*2+0.5, sp:Math.random()*0.5+0.1, col:`hsl(${200+Math.random()*60},80%,${60+Math.random()*40}%)` });
}
function drawStars(dt) {
  stars.forEach(s => {
    s.y += s.sp * dt * 60;
    if (s.y > H) { s.y = -5; s.x = Math.random()*W; }
    cx.fillStyle = s.col;
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    cx.fill();
  });
}

// ═══ ENEMY TYPES (Dynamic visuals per type) ═══
const ET = [
  { ty:0, w:35, h:35, hp:30,  atk:8,  sp:1.5, pts:10, r:17, col:'#f44', acc:'#faa', sD:2500, shape:'round' },
  { ty:1, w:30, h:40, hp:20,  atk:5,  sp:2.0, pts:8,  r:15, col:'#4f4', acc:'#8f8', sD:3000, shape:'diamond' },
  { ty:2, w:45, h:45, hp:60,  atk:12, sp:1.0, pts:20, r:22, col:'#44f', acc:'#aaf', sD:2000, shape:'triangle' },
  { ty:3, w:40, h:40, hp:40,  atk:10, sp:1.2, pts:15, r:20, col:'#f84', acc:'#fc8', sD:2200, shape:'hexagon' },
  { ty:4, w:70, h:70, hp:500, atk:25, sp:0.6, pts:100,r:35, col:'#a0f', acc:'#d8f', sD:1500, boss:true, n:'深淵首領', shape:'boss' },
];
const BOSS_SHAPES = {20:{shape:'dragon',col:'#0f8',name:'青龍'},40:{shape:'phoenix',col:'#f84',name:'赤鳳'},60:{shape:'turtle',col:'#08f',name:'玄武'},80:{shape:'final',col:'#a0f',name:'終極首領'}};

function getType(lv) {
  if (lv>=20 && Math.random()<0.2) return 4;
  if (lv>=12 && Math.random()<0.3) return 3;
  if (lv>=6  && Math.random()<0.35) return 2;
  if (Math.random()<0.4) return 1;
  return 0;
}

function mkEnemy() {
  const ti = getType(G.lv);
  const t = ET[ti];
  const sc = 1 + (G.lv-1)*0.05;
  const n = t.boss ? 1 : (Math.random()<0.4&&t.ty===0)?3:(Math.random()<0.25&&t.ty===1)?2:1;
  for (let i = 0; i < n; i++) {
    enemies.push({
      x: Math.random()*(W-80)+40, y: -t.h,
      w: t.w, h: t.h,
      hp: Math.round(t.hp*sc), mxHp: Math.round(t.hp*sc),
      atk: Math.round(t.atk*(1+(G.lv-1)*0.03)),
      sp: t.sp, pts: t.pts, r: t.r, col: t.col, acc: t.acc, boss: !!t.boss, n: t.n||'',
      mT: Math.random()*1000, mD: 1, sT: Math.random()*2000, sD: t.sD, fl: 0,
      shape: t.shape, t2: Math.random()*Math.PI*2
    });
  }
}

// ═══ ITEM SYSTEM ═══
function spawnItem(x,y) {
  const t = ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)];
  items.push({x,y,...t,vy:2.5,t2:0,pulse:Math.random()*Math.PI*2});
}
function updateItems(dt) {
  items.forEach(it => {
    it.y += it.vy * dt * 60;
    it.t2 += dt; it.pulse += dt * 5;
    const dx = it.x - player.x, dy = it.y - player.y;
    if (Math.hypot(dx,dy) < it.r + player.w/2 + 12) { applyItem(it); it.y = -9999; }
  });
  items = items.filter(it => it.y < H+50 && it.y > -100);
}
function applyItem(it) {
  play('explosion');
  if (it.effect==='shield') { G.shT=it.val; showItemNotify('🛡 防護罩 '+it.val+'秒','#0ff'); shieldBurst(); }
  else if (it.effect==='heal') { G.hp=Math.min(G.hp+it.val,G.mxHp); showItemNotify('❤️ 血量+'+it.val,'#f55'); }
  else if (it.effect==='atk') { atkBoost=it.val; showItemNotify('⚡ 火力x'+it.val+' (8秒)','#ff0'); setTimeout(()=>atkBoost=1,8000); }
  else if (it.effect==='boom') {
    shakeI=25; shakeT=0.6; play('explosion');
    enemies.forEach(e=>{ explode(e.x,e.y,e.w,e.col); G.xp+=e.pts; G.score+=e.pts; G.kills++; if(e.boss){bossActive=false;} e.hp=0; });
    enemies = enemies.filter(e=>e.hp>0);
    showItemNotify('💣 全屏炸彈！','#f80');
  } else if (it.effect==='inv') { invT=it.val; showItemNotify('⚡ 無敵 '+it.val+'秒','#a0f'); }
}
function showItemNotify(txt,col) {
  const el = document.getElementById('kill-notify');
  el.textContent = txt; el.style.color = col;
  el.style.display = 'block'; el.style.animation = 'none';
  el.offsetHeight; el.style.animation = 'notifyAnim 1.0s forwards';
  setTimeout(()=>el.style.display='none',1000);
}
function drawItems() {
  items.forEach(it => {
    const r = it.r * (1 + Math.sin(it.pulse)*0.12);
    cx.shadowBlur = 18; cx.shadowColor = it.col; cx.globalAlpha = 0.85;
    cx.fillStyle = it.col;
    cx.beginPath(); cx.arc(it.x,it.y,r,0,Math.PI*2); cx.fill();
    cx.shadowBlur = 0; cx.globalAlpha = 1;
    cx.font = Math.round(r*1.4)+'px serif';
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(it.emoji, it.x, it.y);
    cx.strokeStyle = it.col; cx.lineWidth = 1.5;
    cx.globalAlpha = 0.35 + Math.sin(it.pulse*2)*0.25;
    cx.beginPath(); cx.arc(it.x,it.y,r+5+Math.sin(it.pulse)*2,0,Math.PI*2); cx.stroke();
    cx.globalAlpha = 1;
  });
}

// ═══ LEADERBOARD ═══
function fetchLB(cb) {
  fetch(LB_URL,{headers:{'X-Access-Key':LB_KEY}})
    .then(r=>r.json()).then(d=>{
      const list = (d.record&&d.record.scores)||[];
      cb(list.sort((a,b)=>b.score-a.score).slice(0,10));
    }).catch(()=>cb([]));
}
function submitScore() {
  if (!G || G.score===0) return;
  const entry = { score:G.score, lv:G.lv, kills:G.kills, time:Date.now() };
  fetch(LB_URL,{headers:{'X-Access-Key':LB_KEY}})
    .then(r=>r.json()).then(d=>{
      const scores = (d.record&&d.record.scores)||[];
      scores.push(entry);
      scores.sort((a,b)=>b.score-a.score);
      fetch('https://api.jsonbin.io/v3/b/69f00f9caaba8821974620d8',{
        method:'PUT', headers:{'X-Access-Key':LB_KEY,'Content-Type':'application/json'},
        body: JSON.stringify({scores:scores.slice(0,20)})
      }).catch(()=>{});
    }).catch(()=>{});
}
function showLB() {
  const p = document.getElementById('lb-panel');
  p.style.display = 'block';
  const tb = document.getElementById('lb-tbody');
  const yourDiv = document.getElementById('lb-your');
  tb.innerHTML = '<tr><td colspan=4 style="text-align:center;color:#aaa;">載入中...</td></tr>';
  fetchLB(list => {
    if (!list.length) { tb.innerHTML='<tr><td colspan=4 style="text-align:center;color:#aaa;">暫無排名</td></tr>'; yourDiv.style.display='none'; return; }
    const rankColors=['#ffd700','#c0c0c0','#cd7f32'];
    tb.innerHTML = list.map((s,i)=>
      '<tr style="color:'+(rankColors[i]||'#fff')+';"><td>'+(i+1)+'</td><td>'+s.score+'</td><td>LV'+s.lv+'</td><td>'+(s.kills||0)+'殺</td></tr>'
    ).join('');
    const myRank = list.findIndex(s=>s.score===G.score&&s.lv===G.lv);
    if (myRank >= 0) {
      yourDiv.textContent = '你的排名: #'+(myRank+1)+' — '+G.score+'分 / LV'+G.lv+' / '+G.kills+'殺';
      yourDiv.style.display = 'block';
    } else { yourDiv.style.display = 'none'; }
  });
}

// ═══ DRONE & MISSILES ═══
function spawnDrone(idx) {
  const offX = (idx%2===0?-1:1)*(20+idx*15);
  drones.push({ x: player.x+offX, y: player.y-60-idx*15, w:30, h:20, t:idx*0.5, lastMissile:0, idx });
  document.getElementById('drone-indicator').style.display = 'flex';
}
function updateDrones(dt) {
  drones.forEach(d => {
    if (!d) return;
    d.t += dt;
    const tx = player.x + (d.idx%2===0?-1:1)*(20+d.idx*15);
    d.x += (tx-d.x)*3*dt;
    d.y = player.y-60-d.idx*15+Math.sin(d.t*2)*5;
    const now = performance.now();
    if (now-d.lastMissile > 500+d.idx*250) {
      d.lastMissile = now;
      const tgt = (()=>{ let m=null,md=Infinity; enemies.forEach(e=>{if(e.hp<=0)return;const d2=Math.hypot(e.x-d.x,e.y-d.y);if(d2<md){md=d2;m=e;}});return m;})();
      const tx2 = tgt? tgt.x : player.x+(Math.random()-0.5)*200;
      const ty2 = tgt? tgt.y : -50;
      missiles.push({ x:d.x, y:d.y, tx:tx2, ty:ty2, target:tgt, t:0, spd:280, r:10, col:'#ff0', trail:[] });
    }
  });
}
function updateMissiles(dt) {
  missiles.forEach(m => {
    m.t += dt;
    m.trail.unshift({x:m.x,y:m.y});
    if (m.trail.length>8) m.trail.pop();
    if (m.target && m.target.hp>0) { m.tx=m.target.x; m.ty=m.target.y; }
    const dx=m.tx-m.x, dy=m.ty-m.y, d=Math.hypot(dx,dy);
    if (d>5) { m.x+=(dx/d)*m.spd*dt; m.y+=(dy/d)*m.spd*dt; }
    else {
      explode(m.x,m.y,60,'#ff0'); play('explosion');
      enemies.forEach(e=>{ if(e.hp<=0)return; const ed=Math.hypot(e.x-m.x,e.y-m.y); if(ed<80){ e.hp-=G.atk*3; e.fl=0.15; if(e.hp<=0){ explode(e.x,e.y,e.w,e.col); G.xp+=e.pts;G.score+=e.pts;G.kills++; if(e.boss){bossActive=false;} checkLvUp(); } } });
      m.y=-9999;
    }
  });
  missiles = missiles.filter(m=>m.y>-100);
}
function drawDrones() {
  drones.forEach(d => {
    if (!d) return;
    cx.fillStyle = '#888';
    cx.beginPath(); cx.ellipse(d.x,d.y,d.w/2,d.h/2,0,0,Math.PI*2); cx.fill();
    cx.fillStyle = '#666';
    cx.fillRect(d.x-d.w,d.y-3,d.w*0.8,6); cx.fillRect(d.x,d.y-3,d.w*0.8,6);
    for(let i=0;i<3;i++){ cx.fillStyle=`rgba(255,${150+i*30},0,${0.8-i*0.2})`; cx.beginPath(); cx.ellipse(d.x,d.y+d.h/2+4+i*3,4-i,6+i*2,0,0,Math.PI*2); cx.fill(); }
    cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(d.x,d.y,4,0,Math.PI*2); cx.fill();
    cx.fillStyle = '#0ff'; cx.font='10px Courier New'; cx.textAlign='center'; cx.fillText('D'+(d.idx+1),d.x,d.y+3);
  });
}
function drawMissiles() {
  missiles.forEach(m => {
    m.trail.forEach((tp,i)=>{ cx.fillStyle=`rgba(255,200,0,${(1-i/8)*0.6})`; cx.beginPath(); cx.arc(tp.x,tp.y,m.r*(1-i/10),0,Math.PI*2); cx.fill(); });
    cx.shadowBlur=15; cx.shadowColor='#ff0'; cx.fillStyle='#ff0'; cx.beginPath(); cx.arc(m.x,m.y,m.r,0,Math.PI*2); cx.fill();
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(m.x,m.y,m.r*0.4,0,Math.PI*2); cx.fill(); cx.shadowBlur=0;
    cx.fillStyle='#f80'; cx.beginPath(); cx.ellipse(m.x,m.y+m.r+3,5,8,0,0,Math.PI*2); cx.fill();
  });
}

// ═══ PARTICLES ═══
function explode(x,y,sz,col){ for(let i=0;i<Math.floor(sz*1.5);i++){const a=Math.random()*Math.PI*2,sp=Math.random()*sz*0.15+1;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:Math.random()*sz*0.08+1,col,li:1,dc:0.02+Math.random()*0.03});} for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;parts.push({x,y,vx:Math.cos(a)*sz*0.05,vy:Math.sin(a)*sz*0.05,r:2,col:'#fff',li:1,dc:0.05});} }
function spark(x,y,col){ for(let i=0;i<6;i++){const a=Math.random()*Math.PI*2;parts.push({x,y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,r:2,col,li:1,dc:0.1});} }
function shieldBurst(){ for(let i=0;i<24;i++){const a=(i/24)*Math.PI*2;parts.push({x:player.x+Math.cos(a)*35,y:player.y+Math.sin(a)*35,vx:Math.cos(a)*4,vy:Math.sin(a)*4,r:4,col:'#0ff',li:1,dc:0.06});} }

// ═══ DRAW PLAYER ═══
function drawPlayer(t) {
  const p = player;
  // 無敵閃爍效果
  if (invT > 0 && Math.floor(invT*10)%2===0) return;
  // shield
  if (G.shT > 0) { cx.strokeStyle='rgba(0,255,255,0.5)'; cx.lineWidth=2; cx.beginPath(); cx.arc(p.x,p.y,30,0,Math.PI*2); cx.stroke(); cx.fillStyle='rgba(0,255,255,0.05)'; cx.fill(); }
  // trail
  p.trail.unshift({x:p.x,y:p.y});
  if (p.trail.length>8) p.trail.pop();
  p.trail.forEach((tp,i)=>{ cx.fillStyle=`rgba(0,200,255,${(1-i/8)*0.3})`; cx.beginPath(); cx.arc(tp.x,tp.y,p.w/2*(1-i/10),0,Math.PI*2); cx.fill(); });
  // body
  cx.fillStyle='#0cf'; cx.beginPath(); cx.arc(p.x,p.y,p.w/2,0,Math.PI*2); cx.fill();
  // head
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(p.x,p.y-p.h*0.25,p.w*0.25,0,Math.PI*2); cx.fill();
  // wings
  cx.fillStyle='#08f'; cx.fillRect(p.x-p.w*0.8,p.y-p.h*0.1,p.w*0.4,p.h*0.2); cx.fillRect(p.x+p.w*0.4,p.y-p.h*0.1,p.w*0.4,p.h*0.2);
  // legs
  cx.fillStyle='#06a'; cx.fillRect(p.x-p.w*0.3,p.y+p.h*0.1,p.w*0.2,p.h*0.3); cx.fillRect(p.x+p.w*0.1,p.y+p.h*0.1,p.w*0.2,p.h*0.3);
}

// ═══ DRAW ENEMIES (Dynamic shapes) ═══
function drawEnemy(e, t) {
  e.t2 += 0.016;
  const pulse = 1 + Math.sin(e.t2 * 3) * 0.06;
  const r = e.r * pulse;
  cx.save();
  cx.translate(e.x, e.y);

  if (e.shape === 'round') {
    // Type 0: Red round alien
    cx.fillStyle = e.col; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(-r*0.3,-r*0.2,r*0.2,0,Math.PI*2); cx.arc(r*0.3,-r*0.2,r*0.2,0,Math.PI*2); cx.fill();
    cx.fillStyle='#000'; cx.beginPath(); cx.arc(-r*0.3,-r*0.2,r*0.1,0,Math.PI*2); cx.arc(r*0.3,-r*0.2,r*0.1,0,Math.PI*2); cx.fill();
  } else if (e.shape === 'diamond') {
    // Type 1: Green diamond
    cx.fillStyle = e.col; cx.beginPath(); cx.moveTo(0,-r); cx.lineTo(r*0.7,0); cx.lineTo(0,r); cx.lineTo(-r*0.7,0); cx.closePath(); cx.fill();
    cx.strokeStyle='#8f8'; cx.lineWidth=2; cx.beginPath(); cx.moveTo(0,-r); cx.lineTo(r*0.7,0); cx.lineTo(0,r); cx.lineTo(-r*0.7,0); cx.closePath(); cx.stroke();
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(0,-r*0.1,r*0.2,0,Math.PI*2); cx.fill();
    cx.fillStyle='#000'; cx.beginPath(); cx.arc(0,-r*0.1,r*0.1,0,Math.PI*2); cx.fill();
  } else if (e.shape === 'triangle') {
    // Type 2: Blue triangle
    cx.fillStyle = e.col; cx.beginPath(); cx.moveTo(0,-r); cx.lineTo(r,0.8*r); cx.lineTo(-r,0.8*r); cx.closePath(); cx.fill();
    cx.strokeStyle='#aaf'; cx.lineWidth=2; cx.beginPath(); cx.moveTo(0,-r); cx.lineTo(r,0.8*r); cx.lineTo(-r,0.8*r); cx.closePath(); cx.stroke();
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(0,r*0.1,r*0.18,0,Math.PI*2); cx.fill();
    cx.fillStyle='#000'; cx.beginPath(); cx.arc(0,r*0.1,r*0.09,0,Math.PI*2); cx.fill();
  } else if (e.shape === 'hexagon') {
    // Type 3: Orange hexagon
    cx.fillStyle = e.col; cx.beginPath(); for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/2;cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);} cx.closePath(); cx.fill();
    cx.strokeStyle='#fc8'; cx.lineWidth=2; cx.beginPath(); for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/2;cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);} cx.closePath(); cx.stroke();
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(-r*0.25,-r*0.1,r*0.15,0,Math.PI*2); cx.arc(r*0.25,-r*0.1,r*0.15,0,Math.PI*2); cx.fill();
    cx.fillStyle='#000'; cx.beginPath(); cx.arc(-r*0.25,-r*0.1,r*0.08,0,Math.PI*2); cx.arc(r*0.25,-r*0.1,r*0.08,0,Math.PI*2); cx.fill();
  } else if (e.shape === 'boss') {
    // Boss: Purple with crown
    cx.shadowBlur = 20; cx.shadowColor = e.col;
    cx.fillStyle = e.col; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
    cx.shadowBlur = 0;
    // Crown
    cx.fillStyle = '#ffd700';
    for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2-Math.PI/2;cx.beginPath();cx.moveTo(Math.cos(a)*r*0.6,Math.sin(a)*r*0.6-r*0.3);cx.lineTo(Math.cos(a+0.3)*r*1.1,Math.sin(a+0.3)*r*1.1-r*0.3);cx.lineTo(Math.cos(a+0.6)*r*0.6,Math.sin(a+0.6)*r*0.6-r*0.3);cx.fill();}
    // Eyes
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(-r*0.3,-r*0.15,r*0.22,0,Math.PI*2); cx.arc(r*0.3,-r*0.15,r*0.22,0,Math.PI*2); cx.fill();
    cx.fillStyle='#f00'; cx.beginPath(); cx.arc(-r*0.3,-r*0.15,r*0.12,0,Math.PI*2); cx.arc(r*0.3,-r*0.15,r*0.12,0,Math.PI*2); cx.fill();
    // HP bar
    const bw = e.w*0.9;
    cx.fillStyle='rgba(255,0,0,0.5)'; cx.fillRect(-bw/2,-e.h*0.75,bw,5);
    cx.fillStyle='#f00'; cx.fillRect(-bw/2,-e.h*0.75,bw*(e.hp/e.mxHp),5);
  }
  cx.restore();
  // HP bar (below enemy)
  if (e.hp < e.mxHp && !e.boss) {
    const bw = e.w*0.8;
    cx.fillStyle='rgba(255,0,0,0.5)'; cx.fillRect(e.x-bw/2,e.y-e.h*0.65,bw,4);
    cx.fillStyle='#f00'; cx.fillRect(e.x-bw/2,e.y-e.h*0.65,bw*(e.hp/e.mxHp),4);
  }
}

function drawBullet(b) {
  cx.fillStyle = b.col; cx.shadowBlur=8; cx.shadowColor=b.col;
  cx.beginPath(); cx.arc(b.x,b.y,b.r,0,Math.PI*2); cx.fill(); cx.shadowBlur=0;
}
function drawParts() {
  parts.forEach(p=>{ cx.globalAlpha=Math.max(0,p.li); cx.fillStyle=p.col; cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fill(); });
  cx.globalAlpha=1;
}
function drawHUD() {
  const hp=document.getElementById('hp-bar'),xp=document.getElementById('xp-bar');
  const lvEl=document.getElementById('ui-lv'),scoreEl=document.getElementById('ui-score');

  const invEl=document.getElementById('inv-indicator');

// ═══ INPUT ═══
const touch={id:null,ox:0,oy:0,dx:0,dy:0,ac:false};
const keys={};
window.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; e.preventDefault(); });
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
canvas.addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; touch.id=t.identifier; touch.ox=t.clientX; touch.oy=t.clientY; touch.dx=0; touch.dy=0; touch.ac=true; },{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); for(let t of e.changedTouches){ if(t.identifier===touch.id){ touch.dx=t.clientX-touch.ox; touch.dy=t.clientY-touch.oy; touch.ox=t.clientX; touch.oy=t.clientY; } } },{passive:false});
canvas.addEventListener('touchend',e=>{ for(let t of e.changedTouches){ if(t.identifier===touch.id) touch.ac=false; } });
function input(){ let mx=0,my=0; if(touch.ac){ mx=touch.dx*0.3; my=touch.dy*0.3; } if(keys['a']||keys['arrowleft']) mx-=5; if(keys['d']||keys['arrowright']) mx+=5; if(keys['w']||keys['arrowup']) my-=5; if(keys['s']||keys['arrowdown']) my+=5; return{mx,my}; }

// ═══ LEVEL UP ═══
function checkLvUp() {
  while (G.xp >= G.xpN) {
    G.xp -= G.xpN; G.lv++;
    G.xpN = Math.floor(G.xpN * 1.25);
    G.mxHp += 15; G.hp = G.mxHp;
    G.atk += 3;
    showLvUp(); play('explosion');
    // 每10等一架無人機
    if (G.lv % 10 === 0) spawnDrone(Math.floor(G.lv/10)-1);
    // 魔王觸發
    if (G.lv % 20 === 0 && G.lv <= 80 && G.lv > bossSpawnedLv && !bossActive) {
      bossPendingLv = G.lv; bossSpawnedLv = G.lv;
      enemies.forEach(e => e.hp = 0); enemies = [];
    }
  }
}
function showLvUp() {
  const el=document.getElementById('hud-levelup');
  el.textContent='⬆ 等級 '+G.lv+'!';
  el.style.display='block'; el.style.animation='none';
  el.offsetHeight; el.style.animation='levelup 1.2s forwards';
  setTimeout(()=>el.style.display='none',1200);
}
function showKill(txt,col){ const el=document.getElementById('kill-notify'); el.textContent=txt; el.style.color=col; el.style.display='block'; el.style.animation='none'; el.offsetHeight; el.style.animation='notifyAnim 0.8s forwards'; setTimeout(()=>el.style.display='none',800); }

// ═══ FIRE ═══
function doFire() {
  if (!G.run) return;
  const bx=player.x, by=player.y-player.h/2;
  bullets.push({x:bx,y:by,vx:0,vy:-16,r:5,atk:Math.round(G.atk*atkBoost),col:'#0ff'});
}

// ═══ GAME LOOP ═══
function loop(t) {
  requestAnimationFrame(loop);
  const dt = Math.min((t-lastT)/1000, 0.05);
  lastT = t;
  const shk = shakeT>0 ? shakeI : 0;
  cx.save();
  if (shk>0) cx.translate((Math.random()-0.5)*shk,(Math.random()-0.5)*shk);
  cx.fillStyle='#020818'; cx.fillRect(0,0,W,H);
  drawStars(dt);
  if (!G.run) { cx.restore(); return; }
  G.time += dt;

  const {mx,my} = input();
  player.x = Math.max(player.w/2,Math.min(W-player.w/2,player.x+mx));
  player.y = Math.max(player.h/2,Math.min(H-player.h/2,player.y+my));

  const now = performance.now();
  if (now-lastFireTime >= 80) { lastFireTime=now; doFire(); }

  updateDrones(dt); updateMissiles(dt); updateItems(dt);

  // Timers
  if (invT>0) invT=Math.max(0,invT-dt);
  G.ndT += dt;
  if (G.ndT>=5) { G.ndT=0; G.shT=3; shieldBurst(); }
  if (G.shT>0) { G.shT=Math.max(0,G.shT-dt); }

  // Boss logic
  if (bossPendingLv>0) { bossWarn=1.5; bossActive=true; bossPendingLv=0; play('boss'); }
  if (bossWarn>0) {
    bossWarn -= dt;
    cx.fillStyle='#f00'; cx.font='bold 28px Courier New'; cx.textAlign='center';
    cx.fillText('⚠ 魔王來襲 ⚠',W/2,H/3);
    if (bossWarn<=0) {
      const bn={20:'青龍',40:'赤鳳',60:'玄武',80:'終極首領'};
      const lv=G.lv;
      const sc=1+(lv-1)*0.1;
      const bossDef={w:70,h:70,hp:500+lv*25,atk:25+lv,sp:0.5,pts:100+lv*15,r:38,col:'#a0f',acc:'#d8f',sD:1400,boss:true,n:bn[lv]||'深淵首領',shape:'boss'};
      enemies.push({x:W/2,y:-80,...bossDef,hp:Math.round(bossDef.hp*sc),mxHp:Math.round(bossDef.hp*sc),atk:Math.round(bossDef.atk*sc),mT:0,mD:1,sT:1000,sD:bossDef.sD,fl:0,t2:0});
      spawnT=15;
    }
  }

  // Spawn
  const sr = Math.max(0.4,2.0-G.lv*0.015);
  if (spawnT<=0 && bossWarn<=0 && !G.over) { spawnT=sr; mkEnemy(); }
  spawnT -= dt;
  if (shakeT>0) shakeT -= dt;

  // Move bullets
  bullets.forEach(b=>{b.x+=b.vx*dt*60;b.y+=b.vy*dt*60;});
  bullets=bullets.filter(b=>b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20);

  eBullets.forEach(b=>{b.x+=b.vx*dt*60;b.y+=b.vy*dt*60;});
  eBullets=eBullets.filter(b=>b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20);

  enemies.forEach(e=>{
    e.y+=e.sp*dt*60;
    e.mT-=dt*1000; if(e.mT<=0){e.mD*=-1;e.mT=800+Math.random()*600;}
    e.x+=e.sp*e.mD*dt*30;
    e.sT-=dt*1000;
    if(e.sT<=0&&e.y>0){e.sT=e.sD;const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;eBullets.push({x:e.x,y:e.y+e.h/2,vx:dx/d*5,vy:dy/d*5,atk:e.atk,r:5,col:'#f66'});}
    if(e.fl>0) e.fl-=dt;
  });
  enemies=enemies.filter(e=>e.y<H+100&&e.hp>0);

  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.96;p.vy*=0.96;p.li-=p.dc;});
  parts=parts.filter(p=>p.li>0);

  // Collision: bullets vs enemies
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(e.hp<=0) return;
      if(Math.abs(b.x-e.x)<e.w/2+b.r&&Math.abs(b.y-e.y)<e.h/2+b.r){
        e.hp-=b.atk; e.fl=0.1; spark(b.x,b.y,e.acc);
        if(e.hp<=0){
          explode(e.x,e.y,e.w,e.col); G.xp+=e.pts;G.score+=e.pts;G.kills++; checkLvUp();
          shakeI=e.boss?12:5; shakeT=0.2;
          if(Math.random()<ITEM_DROP) spawnItem(e.x,e.y);
          if(e.boss){ showKill('★ '+e.n+' 擊破！','#ff0'); bossActive=false; spawnItem(e.x-20,e.y);spawnItem(e.x+20,e.y); }
        }
        b.y=-999;
      }
    });
  });
  bullets=bullets.filter(b=>b.y>-50);

  // Collision: enemy bullets vs player
  if(G.shT<=0){
    eBullets.forEach(b=>{
      const dx=b.x-player.x,dy=b.y-player.y;
      if(Math.hypot(dx,dy)<player.w/2+b.r){
        if(invT<=0) G.hp-=b.atk; b.y=-999; G.ndT=0;
        shakeI=8; shakeT=0.15; spark(player.x,player.y,'#f66');
        if(G.hp<=0) gameOver();
      }
    });
    enemies.forEach(e=>{
      if(e.hp<=0) return;
      const dx=player.x-e.x,dy=player.y-e.y;
      if(Math.hypot(dx,dy)<player.w/2+e.r){
        if(invT<=0) G.hp-=e.atk;
        e.hp-=G.atk*2; G.ndT=0;
        shakeI=10; shakeT=0.2; spark(player.x,player.y,'#f66');
        if(G.hp<=0) gameOver();
      }
    });
  }
  eBullets=eBullets.filter(b=>b.y>-50);

  // Draw
  enemies.forEach(e=>drawEnemy(e,t));
  bullets.forEach(b=>drawBullet(b));
  eBullets.forEach(b=>drawBullet(b));
  drawMissiles(); drawItems(); drawParts(); drawDrones(); drawPlayer(t);
  cx.fillStyle='rgba(0,200,255,0.9)'; cx.font='bold 14px Courier New'; cx.textAlign='right';
  cx.fillText('分數: '+G.score+' | 等級: '+G.lv,W-12,H-12);
  cx.restore();
  drawHUD();
}

function gameOver() {
  G.run=false; G.over=true;
  explode(player.x,player.y,80,'#0ff');
  if(G.score>G.hs) G.hs=G.score;
  try { localStorage.setItem(SAVE,JSON.stringify({lv:G.lv,mxHp:G.mxHp,atk:G.atk,kills:G.kills,hs:G.hs})); } catch(e){}
  submitScore();
  document.getElementById('go-info').textContent='分數: '+G.score+' / 等級: '+G.lv+' / 擊殺: '+G.kills;
  document.getElementById('gameover-screen').style.display='flex';
  document.getElementById('ui').style.display='none';
  document.getElementById('ctrl').style.display='none';
}

function startGame() {
  const saved=(()=>{try{return JSON.parse(localStorage.getItem(SAVE)||'null');}catch(e){return null;}})();
  if(saved){ G={run:false,over:false,lv:saved.lv||1,xp:0,xpN:100,hp:saved.mxHp||100,mxHp:saved.mxHp||100,atk:saved.atk||10,kills:saved.kills||0,hs:saved.hs||0,score:0,time:0,shT:0,ndT:0}; }
  else { G={run:true,over:false,lv:1,xp:0,xpN:100,hp:100,mxHp:100,atk:10,kills:0,hs:0,score:0,time:0,shT:0,ndT:0}; }
  player={x:W/2,y:H*0.75,w:40,h:50,trail:[]};
  bullets=[]; eBullets=[]; enemies=[]; parts=[]; missiles=[]; items=[]; drones=[];
  invT=0; atkBoost=1;
  spawnT=0.5; bossWarn=0; shakeT=0; bossPendingLv=0;
  bossSpawnedLv=Math.floor(G.lv/20)*20;
  bossActive=false;
  lastFireTime=performance.now();
  // Restore drones
  for(let i=0;i<Math.floor(G.lv/10);i++) spawnDrone(i);
  document.getElementById('start-screen').style.display='none';
  document.getElementById('gameover-screen').style.display='none';
  document.getElementById('ui').style.display='block';
  document.getElementById('ctrl').style.display='block';
  G.run=true;
}

// INIT
window.addEventListener('resize',resize);
resize(); mkStars();
document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-restart').addEventListener('click',startGame);
document.getElementById('btn-lb').addEventListener('click',showLB);
document.getElementById('btn-lb-start').addEventListener('click',showLB);
document.getElementById('btn-lb-close').addEventListener('click',()=>document.getElementById('lb-panel').style.display='none');
[['left','a'],['right','d'],['up','w'],['down','s']].forEach(([id,key])=>{
  const el=document.getElementById('btn-'+id);
  if(!el) return;
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;},{passive:false});
  el.addEventListener('mousedown',()=>keys[key]=true);
  el.addEventListener('mouseup',()=>keys[key]=false);
});
requestAnimationFrame(loop);
</script>
</body>
